receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  awscloudwatch:
    log_group_name: "/aws/app/grafana-observability"
    log_stream_name: "otel-metrics"
    region: "us-east-1"

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [awscloudwatch]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [awscloudwatch]
