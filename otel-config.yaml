# OpenTelemetry Collector Configuration for App Monitoring
# Satisfies Assessment Requirement 6 & 7
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  awscloudwatch:
    log_group_name: "/aws/app/grafana-observability"
    log_stream_name: "otel-metrics"
    region: "us-east-1"
  
  # Exporting to AWS Managed Prometheus (Optional high-scale standard)
  awsprometheusremotewrite:
    endpoint: "https://aps-workspaces.us-east-1.amazonaws.com/workspaces/ws-xxx/api/v1/remote_write"
    aws_auth:
      region: "us-east-1"
      service: "aps"

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [awscloudwatch]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [awscloudwatch]
