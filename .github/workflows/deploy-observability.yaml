name: Deploy Observability Stack

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1                  # Adjust your preferred AWS Region
  S3_BUCKET: your-cfn-deployment-bucket  # Replace with your actual deployment bucket name

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsDeploymentRole # Replace with your IAM Role
          aws-region: ${{ env::AWS_REGION }}

      - name: Package Lambda Code
        run: |
          mkdir -p dist
          cd src/lambda
          zip -r ../../dist/install_plugins.zip install_plugins.py
          cd ../..

      - name: Upload Lambda Package to S3
        run: |
          aws s3 cp dist/install_plugins.zip s3://${{ env.S3_BUCKET }}/lambda/install_plugins.zip

      - name: Deploy CloudFormation Stack
        uses: aws-actions/aws-cloudformation-github-deploy@v1
        with:
          name: grafana-observability-stack
          template: cloudformation/master-template.yaml
          no-fail-on-empty-changeset: "1"
          capabilities: CAPABILITY_NAMED_IAM
          parameter-overrides: >-
            DeploymentBucket=${{ env.S3_BUCKET }},
            LambdaZipKey=lambda/install_plugins.zip
