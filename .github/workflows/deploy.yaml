name: Deploy Observability Stack
on: [push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Zip Lambda
        run: |
          curl https://raw.githubusercontent.com/aws-cloudformation/custom-resource-helper/master/python/cfnresponse.py -o cfnresponse.py
          zip -j lambda/plugin_manager.zip lambda/plugin_manager.py cfnresponse.py

      - name: Upload to S3
        run: aws s3 cp lambda/plugin_manager.zip s3://cf-templates-1712fgpz3xbu9-us-east-1/lambda/plugin_manager.zip

      - name: Deploy CloudFormation
        run: |
          aws cloudformation create-stack \
            --stack-name live-observability-core \
            --template-body file://cloudformation/main-stack.yaml \
            --capabilities CAPABILITY_NAMED_IAM
