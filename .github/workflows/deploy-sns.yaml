name: Deploy Grafana Workspace
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation create-stack \
            --stack-name grafana-workspace-stack \
            --template-body file://cfn/grafana-workspace.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --region us-east-1 || echo "Stack already exists, proceeding..."
          
          aws cloudformation wait stack-exists --stack-name grafana-workspace-stack

      - name: Get Workspace URL
        run: |
          ENDPOINT=$(aws grafana describe-workspace --workspace-id $(aws cloudformation describe-stacks --stack-name grafana-workspace-stack --query "Stacks[0].Outputs[?OutputKey=='WorkspaceId'].OutputValue" --output text) --query "workspace.endpoint" --output text)
          echo "GRAFANA_URL=https://$ENDPOINT" >> $GITHUB_ENV

      - name: Push Grafana Data Source
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @datasource.json \
            "${{ env.GRAFANA_URL }}/api/datasources" || echo "Already exists"

      - name: Push Grafana Dashboard
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @dashboard.json \
            "${{ env.GRAFANA_URL }}/api/dashboards/db"
