name: Deploy Grafana Workspace
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy CloudFormation Stack
        run: |
          # Use create-stack to bypass the ChangeSet validation hook
          aws cloudformation create-stack \
            --stack-name grafana-workspace-stack \
            --template-body file://cfn/grafana-workspace.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --region us-east-1
          
          echo "Waiting for stack creation to finish..."
          aws cloudformation wait stack-create-complete --stack-name grafana-workspace-stack

      - name: Wait for Workspace and Get URL
        id: vars
        run: |
          WS_ID=$(aws cloudformation describe-stacks --stack-name grafana-workspace-stack --query "Stacks[0].Outputs[?OutputKey=='WorkspaceId'].OutputValue" --output text)
          
          echo "Waiting for Grafana workspace to be ACTIVE (this takes ~5-10 mins)..."
          aws grafana wait workspace-active --workspace-id $WS_ID
          
          ENDPOINT=$(aws grafana describe-workspace --workspace-id $WS_ID --query "workspace.endpoint" --output text)
          echo "GRAFANA_URL=https://$ENDPOINT" >> $GITHUB_ENV
          echo "WS_ID=$WS_ID" >> $GITHUB_ENV

      - name: Generate Temporary Admin Token
        run: |
          TOKEN=$(aws grafana create-workspace-api-key --key-name "GitHubAction-$(date +%s)" --key-role "ADMIN" --seconds-to-live 3600 --workspace-id ${{ env.WS_ID }} --query "key" --output text)
          echo "DYNAMIC_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Push Grafana Data Source
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ env.DYNAMIC_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @datasource.json \
            "${{ env.GRAFANA_URL }}/api/datasources" || echo "Data source already exists or failed"

      - name: Push Grafana Dashboard
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ env.DYNAMIC_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @dashboard.json \
            "${{ env.GRAFANA_URL }}/api/dashboards/db"
