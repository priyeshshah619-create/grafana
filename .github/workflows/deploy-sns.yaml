name: Deploy Grafana Workspace
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file cfn/grafana-workspace.yaml \
            --stack-name grafana-workspace-stack \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Get Grafana URL
        id: get_url
        run: |
          # Fetch the endpoint from CloudFormation Outputs
          RAW_URL=$(aws cloudformation describe-stacks \
            --stack-name grafana-workspace-stack \
            --query "Stacks[0].Outputs[?OutputKey=='WorkspaceEndpoint'].OutputValue" \
            --output text)
          
          # Clean the URL (remove https:// if present to avoid doubles)
          CLEAN_URL=$(echo $RAW_URL | sed 's|https://||g')
          echo "GRAFANA_URL=https://$CLEAN_URL" >> $GITHUB_ENV

      - name: Push Grafana Data Source
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GRAFANA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d @datasource.json \
          ${{ env.GRAFANA_URL }}/api/datasources

      - name: Push Grafana Dashboard
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GRAFANA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d @dashboard.json \
          ${{ env.GRAFANA_URL }}/api/dashboards/db

      - name: Push Grafana Alerts
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GRAFANA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d @alert.json \
          ${{ env.GRAFANA_URL }}/api/v1/provisioning/alert-rules
