name: Deploy Grafana Workspace
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy Grafana Infrastructure (CloudFormation)
        run: |
          aws cloudformation deploy \
            --stack-name grafana-workspace-stack \
            --template-file cfn/grafana-workspace.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Get Workspace URL and ID
        run: |
          # Pulling the Endpoint directly from CloudFormation Outputs
          ENDPOINT=$(aws cloudformation describe-stacks --stack-name grafana-workspace-stack --query "Stacks[0].Outputs[?OutputKey=='WorkspaceEndpoint'].OutputValue" --output text)
          echo "GRAFANA_URL=https://$ENDPOINT" >> $GITHUB_ENV
          
          WORKSPACE_ID=$(aws cloudformation describe-stacks --stack-name grafana-workspace-stack --query "Stacks[0].Outputs[?OutputKey=='WorkspaceId'].OutputValue" --output text)
          echo "WORKSPACE_ID=$WORKSPACE_ID" >> $GITHUB_ENV

      - name: Push Grafana Data Source
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @datasource.json \
            "${{ env.GRAFANA_URL }}/api/datasources" || echo "Data source update skipped or already exists"

      - name: Push Grafana Dashboard
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @dashboard.json \
            "${{ env.GRAFANA_URL }}/api/dashboards/db"

      - name: Push Grafana Alerts
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.GRAFANA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @alert.json \
            "${{ env.GRAFANA_URL }}/api/v1/provisioning/alert-rules" || echo "Alerts already provisioned"
