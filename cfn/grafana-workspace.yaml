AWSTemplateFormatVersion: '2010-09-09'
Description: Grafana Workspace (V20 - Early Validation Fix)

Resources:
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaRole.Arn
      GrafanaVersion: '10.4'
      # Using a literal block scalar to ensure the JSON is passed perfectly
      WorkspaceConfiguration: >
        {"plugins":{"pluginAdminEnabled":true}}

  GrafanaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GrafanaWorkspaceRole-V20-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
        - arn:aws:iam::aws:policy/AmazonPrometheusFullAccess
        - arn:aws:iam::aws:policy/AWSXrayReadOnlyAccess

Outputs:
  WorkspaceEndpoint:
    Description: The endpoint for the Grafana workspace
    Value: !GetAtt GrafanaWorkspace.Endpoint
