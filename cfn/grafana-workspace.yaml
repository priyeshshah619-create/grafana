AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Managed Grafana Assessment Stack with plugin custom resource and CloudWatch dashboard

Resources:
  GrafanaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: grafana-assessment-service-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonGrafanaCloudWatchAccess

  MyGrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: CUSTOMER_MANAGED
      Name: grafana-assessment-workspace
      DataSources:
        - CLOUDWATCH
      RoleArn: !GetAtt GrafanaServiceRole.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: grafana-plugin-installer-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaPluginAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:DescribeWorkspace
                  - grafana:UpdateWorkspace
                Resource: "*"

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: grafana-plugin-installer-final
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          import urllib3
          import boto3

          http = urllib3.PoolManager()

          def send(event, context, status, data, reason=None):
              body = {
                  "Status": status,
                  "Reason": reason or "See CloudWatch Logs",
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data
              }
              encoded = json.dumps(body).encode("utf-8")
              http.request("PUT", event["ResponseURL"], body=encoded, headers={"content-type": "", "content-length": str(len(encoded))})

          def handler(event, context):
              client = boto3.client("grafana")
              try:
                  if event["RequestType"] in ["Create", "Update"]:
                      workspace_id = event["ResourceProperties"]["WorkspaceId"]
                      plugins = event["ResourceProperties"]["Plugins"]
                      client.update_workspace(
                          workspaceId=workspace_id,
                          plugins=plugins
                      )
                  send(event, context, "SUCCESS", {"Message": "Plugins processed"})
              except Exception as e:
                  send(event, context, "FAILED", {"Message": str(e)}, str(e))

  GrafanaPluginsResource:
    Type: Custom::GrafanaPlugins
    DependsOn: MyGrafanaWorkspace
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref MyGrafanaWorkspace
      Plugins:
        - grafana-clock-panel
        - grafana-piechart-panel

  GrafanaAlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: grafana-alerts-topic

  CloudWatchOTELDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: OTEL-Business-Metrics
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 18,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/Grafana", "WorkspaceUpdates", "WorkspaceId", "${MyGrafanaWorkspace}" ]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}",
                "title": "Grafana Workspace Updates"
              }
            }
          ]
        }

Outputs:
  WorkspaceId:
    Value: !Ref MyGrafanaWorkspace
  WorkspaceEndpoint:
    Value: !GetAtt MyGrafanaWorkspace.Endpoint
  SNSTopicArn:
    Value: !Ref GrafanaAlertSNSTopic
