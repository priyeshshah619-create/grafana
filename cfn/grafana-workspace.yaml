AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Managed Grafana - Assessment Version'

Resources:
  # 1. Workspace Role
  GrafanaServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess

  # 2. Grafana Workspace
  GrafanaWorkspace:
    Type: 'AWS::Grafana::Workspace'
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: CUSTOMER_MANAGED
      RoleArn: !GetAtt GrafanaServiceRole.Arn
      Name: grafana-assessment-workspace

  # 3. Lambda Role
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspaceConfiguration
                Resource: "*"

  # 4. Plugin Enabler Lambda
  PluginInstallerFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json, boto3, urllib3
          http = urllib3.PoolManager()
          def send(event, context, status, data):
              body = json.dumps({'Status': status, 'Reason': 'See Logs', 'PhysicalResourceId': context.log_stream_name, 'StackId': event['StackId'], 'RequestId': event['RequestId'], 'LogicalResourceId': event['LogicalResourceId'], 'Data': data})
              http.request('PUT', event['ResponseURL'], body=body)
          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      boto3.client('grafana').update_workspace_configuration(
                          workspaceId=event['ResourceProperties']['WorkspaceId'],
                          configuration=json.dumps({"plugins": {"pluginAdminEnabled": True}})
                      )
                  send(event, context, "SUCCESS", {})
              except Exception as e:
                  print(e); send(event, context, "FAILED", {"Message": str(e)})

  # 5. Custom Resource
  EnablePlugins:
    Type: 'Custom::GrafanaPluginEnabler'
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

Outputs:
  WorkspaceId:
    Value: !Ref GrafanaWorkspace
  WorkspaceEndpoint:
    Value: !GetAtt GrafanaWorkspace.Endpoint
