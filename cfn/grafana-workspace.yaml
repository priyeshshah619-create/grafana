AWSTemplateFormatVersion: '2010-09-09'
Description: Grafana Workspace with Robust Custom Resource (Status Polling)

Resources:
  # 1. IAM Role (Self-Contained Inline Policy)
  GrafanaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GrafanaExecutionRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - grafana.amazonaws.com
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaSelfContainedPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspaceConfiguration
                  - grafana:DescribeWorkspace
                Resource: !Sub 'arn:aws:grafana:${AWS::Region}:${AWS::AccountId}:/workspaces/*'
              - Effect: Allow
                Action:
                  - aps:*
                  - xray:Get*
                  - xray:BatchGet*
                  - cloudwatch:Get*
                  - cloudwatch:List*
                  - cloudwatch:Describe*
                  - logs:Describe*
                  - logs:Get*
                  - logs:List*
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  # 2. The Main Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaRole.Arn
      GrafanaVersion: '10.4'

  # 3. Enhanced Lambda Function (With Status Polling)
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt GrafanaRole.Arn
      Runtime: python3.9
      Timeout: 900 # 15 minutes to allow for workspace activation
      Code:
        ZipFile: |
          import boto3
          import json
          import cfnresponse
          import time

          def handler(event, context):
              print(f"Received event: {json.dumps(event)}")
              client = boto3.client('grafana', region_name='us-east-1')
              workspace_id = event['ResourceProperties']['WorkspaceId']
              
              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              # 1. Poll for ACTIVE status
              print(f"Polling workspace {workspace_id} for ACTIVE status...")
              for i in range(15): # Poll for 7.5 minutes
                  try:
                      response = client.describe_workspace(workspaceId=workspace_id)
                      status = response['workspace']['status']
                      print(f"Current status: {status}")
                      if status == 'ACTIVE':
                          break
                  except Exception as e:
                      print(f"Polling error: {str(e)}")
                  time.sleep(30)
              
              # 2. Extra buffer for internal propagation
              time.sleep(60)
              
              # 3. Attempt configuration update
              attempts = 0
              last_error = ""
              while attempts < 5:
                  try:
                      print(f"Attempt {attempts + 1}: Updating configuration...")
                      client.update_workspace_configuration(
                          workspaceId=workspace_id,
                          configuration=json.dumps({
                              "plugins": { "plugins": ["grafana-clock-panel"] }
                          })
                      )
                      print("SUCCESS: Configuration applied.")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Status": "Success"})
                      return
                  except Exception as e:
                      last_error = str(e)
                      print(f"Update failed: {last_error}")
                      attempts += 1
                      time.sleep(45)
              
              cfnresponse.send(event, context, cfnresponse.FAILED, {"Message": f"Final error: {last_error}"})

  # 4. The Custom Resource
  GrafanaPluginInstallation:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

Outputs:
  WorkspaceEndpoint:
    Description: The endpoint for the Grafana workspace
    Value: !GetAtt GrafanaWorkspace.Endpoint
