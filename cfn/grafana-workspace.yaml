AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Managed Grafana with Automated Role and Plugin Installation'

Parameters:
  WorkspaceName:
    Type: String
    Default: 'Observability-Workspace'
  GrafanaPlugins:
    Type: CommaDelimitedList
    Default: 'grafana-clock-panel,grafana-piechart-panel'

Resources:
  # 1. IAM Role for Grafana Workspace
  GrafanaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GrafanaServiceRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonGrafanaCloudWatchAccess
        - arn:aws:iam::aws:policy/AmazonSNSFullAccess

  # 2. The Managed Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: !Ref WorkspaceName
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: CUSTOMER_MANAGED
      WorkspaceRoleArn: !GetAtt GrafanaServiceRole.Arn

  # 3. IAM Role for Custom Resource Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspace
                  - grafana:DescribeWorkspace
                Resource: '*'

  # 4. Lambda Function to Install Plugins
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              grafana = boto3.client('grafana')
              workspace_id = event['ResourceProperties']['WorkspaceId']
              plugins = event['ResourceProperties']['Plugins']
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      grafana.update_workspace(
                          workspaceId=workspace_id,
                          configuration={'plugins': plugins}
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Message": str(e)})

  # 5. Custom Resource Trigger
  InstallPluginsResource:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !GetAtt GrafanaWorkspace.Id
      Plugins: !Ref GrafanaPlugins

Outputs:
  WorkspaceId:
    Value: !GetAtt GrafanaWorkspace.Id
  WorkspaceEndpoint:
    Value: !GetAtt GrafanaWorkspace.Endpoint
