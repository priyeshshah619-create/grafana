AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Managed Grafana Workspace with Plugin Installation via Custom Resource

Resources:
  GrafanaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub GrafanaExecutionRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - grafana.amazonaws.com
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:DescribeWorkspace
                  - grafana:UpdateWorkspaceConfiguration
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaExecutionRole.Arn
      GrafanaVersion: '10.4'

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt GrafanaExecutionRole.Arn
      Timeout: 600 # Increased to allow for retries
      Code:
        ZipFile: |
          import json
          import time
          import urllib.request
          import boto3
          from botocore.exceptions import ClientError

          def send_response(event, context, status, data):
              response_body = json.dumps({
                  'Status': status,
                  'Reason': f"See logs: {context.log_stream_name}",
                  'PhysicalResourceId': context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data
              }).encode()
              req = urllib.request.Request(event['ResponseURL'], data=response_body, method='PUT', headers={'content-type': ''})
              urllib.request.urlopen(req)

          def handler(event, context):
              if event['RequestType'] == 'Delete':
                  send_response(event, context, 'SUCCESS', {})
                  return

              workspace_id = event['ResourceProperties']['WorkspaceId']
              client = boto3.client('grafana', region_name='us-east-1')

              # Retry loop to handle "Workspace does not exist" or "Internal Error" during propagation
              for attempt in range(10):
                  try:
                      print(f"Attempt {attempt + 1}: Updating configuration for {workspace_id}")
                      client.update_workspace_configuration(
                          workspaceId=workspace_id,
                          configuration=json.dumps({
                              "plugins": {"plugins": ["grafana-clock-panel", "grafana-piechart-panel"]}
                          })
                      )
                      send_response(event, context, 'SUCCESS', {"Message": "Plugins installed"})
                      return
                  except Exception as e:
                      print(f"Error: {str(e)}")
                      # Wait 30 seconds before retrying
                      time.sleep(30)
              
              send_response(event, context, 'FAILED', {"Error": "Timed out waiting for Grafana API"})

  GrafanaPluginInstaller:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

Outputs:
  WorkspaceEndpoint:
    Description: Grafana Workspace URL
    Value: !GetAtt GrafanaWorkspace.Endpoint
