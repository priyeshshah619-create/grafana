AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Managed Grafana 10.4 – SSO + Automated Plugin Installation (Final Corrected Schema)

Resources:
  GrafanaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GrafanaServiceRole-${AWS::StackName}-V10'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaServiceRole.Arn
      GrafanaVersion: '10.4'
      # Ensuring this is properly formatted for the CFN schema
      Configuration: |
        {
          "plugins": {
            "pluginAdminEnabled": true
          }
        }

  PluginLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GrafanaPluginLambdaRole-${AWS::StackName}-V10'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaApiAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:DescribeWorkspace
                  - grafana:CreateWorkspaceApiKey
                Resource: "*"

  PluginInstallerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-FinalFix-V10'
      Runtime: python3.9
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt PluginLambdaRole.Arn
      Code:
        ZipFile: |
          import json, boto3, urllib3, time
          http = urllib3.PoolManager()
          def send(event, context, status, reason="OK"):
              response_body = json.dumps({
                  "Status": status, "Reason": reason,
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event['StackId'], "RequestId": event['RequestId'],
                  "LogicalResourceId": event['LogicalResourceId'], "Data": {}
              })
              http.request("PUT", event['ResponseURL'], body=response_body)
          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      wid = event['ResourceProperties']['WorkspaceId']
                      plugins = event['ResourceProperties']['Plugins']
                      client = boto3.client('grafana')
                      ws = client.describe_workspace(workspaceId=wid)['workspace']
                      endpoint = f"https://{ws['endpoint']}" if not ws['endpoint'].startswith('http') else ws['endpoint']
                      key_res = client.create_workspace_api_key(
                          workspaceId=wid, keyName='plugin-installer-v10',
                          keyRole='ADMIN', secondsToLive=600
                      )
                      key = key_res['key']
                      headers = {"Authorization": f"Bearer {key}", "Content-Type": "application/json"}
                      time.sleep(30)
                      for p in plugins:
                          url = f"{endpoint}/api/plugins/{p}/install"
                          http.request("POST", url, headers=headers)
                  send(event, context, "SUCCESS")
              except Exception as e:
                  send(event, context, "FAILED", str(e))

  PluginTriggerV10:
    Type: Custom::GrafanaPluginInstall
    DependsOn: GrafanaWorkspace
    Properties:
      ServiceToken: !GetAtt PluginInstallerLambda.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins:
        - grafana-clock-panel
        - grafana-piechart-panel
