AWSTemplateFormatVersion: '2010-09-09'
Description: 'Grafana Workspace with IAM Role and Plugin Installation via Custom Resource'

Resources:
  # 1. IAM Role for Grafana Workspace
  GrafanaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonGrafanaCloudWatchAccess

  # 2. Grafana Workspace
  MyGrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      Name: grafana-assessment-workspace
      DataSources: [CLOUDWATCH]
      WorkspaceRoleArn: !GetAtt GrafanaServiceRole.Arn

  # 3. IAM Role for Lambda Plugin Installer
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: [lambda.amazonaws.com]}
            Action: ["sts:AssumeRole"]
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: 
                  - "grafana:UpdateWorkspace"
                  - "grafana:DescribeWorkspace"
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"

  # 4. Lambda Function (Actual Plugin Logic)
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: grafana-plugin-installer
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              grafana = boto3.client('grafana')
              try:
                  workspace_id = event['ResourceProperties']['WorkspaceId']
                  plugins = event['ResourceProperties']['Plugins']
                  if event['RequestType'] in ['Create', 'Update']:
                      grafana.update_workspace(workspaceId=workspace_id, plugins=plugins)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Message": str(e)})

  # 5. Custom Resource to trigger Plugin Installation
  GrafanaPluginsResource:
    Type: Custom::GrafanaPlugins
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !GetAtt MyGrafanaWorkspace.Id
      Plugins: 
        - "grafana-clock-panel"
        - "grafana-piechart-panel"

Outputs:
  WorkspaceEndpoint:
    Value: !GetAtt MyGrafanaWorkspace.Endpoint
  WorkspaceId:
    Value: !GetAtt MyGrafanaWorkspace.Id
