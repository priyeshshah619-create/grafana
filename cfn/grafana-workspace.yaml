AWSTemplateFormatVersion: '2010-09-09'
Description: 'Full Observability Stack: Grafana Plugins, OTEL Monitoring, and SNS Alerts'

Resources:
  # 1. IAM Role for Grafana
  GrafanaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: grafana.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonGrafanaCloudWatchAccess

  # 1a. Managed Grafana Workspace (SSO Integration)
  MyGrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      Name: grafana-assessment-workspace
      DataSources: [CLOUDWATCH]
      WorkspaceRoleArn: !GetAtt GrafanaServiceRole.Arn

  # 1b. Lambda Logic for Plugin Installation (Direct Client Feedback)
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaPluginAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspace
                  - grafana:DescribeWorkspace
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: grafana-plugin-installer-final
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              client = boto3.client('grafana')
              try:
                  w_id = event['ResourceProperties']['WorkspaceId']
                  plugs = event['ResourceProperties']['Plugins']
                  if event['RequestType'] in ['Create', 'Update']:
                      client.update_workspace(workspaceId=w_id, plugins=plugs)
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Status": "Complete"})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Message": str(e)})

  # Trigger Plugin Installation via Custom Resource
  GrafanaPluginsResource:
    Type: Custom::GrafanaPlugins
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref MyGrafanaWorkspace
      Plugins: 
        - "grafana-clock-panel"
        - "grafana-piechart-panel"

  # 3. SNS Topic for Alerts (Requirement 3)
  GrafanaAlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: grafana-alerts-topic

  # 2 & 6. CloudWatch Dashboard for OTEL Metrics (Requirement 2 & 6)
  CloudWatchOTELDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: OTEL-Business-Metrics
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [ [ "AWS/Grafana", "WorkspaceUpdates" ] ],
                "period": 300,
                "stat": "Sum",
                "region": "us-east-1",
                "title": "Business Logic Monitoring (OTEL Data)"
              }
            }
          ]
        }

Outputs:
  WorkspaceURL:
    Value: !GetAtt MyGrafanaWorkspace.Endpoint
  SNSAlertTopic:
    Value: !Ref GrafanaAlertSNSTopic