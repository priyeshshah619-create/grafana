AWSTemplateFormatVersion: '2010-09-09'
Description: Grafana Workspace with Plugin Installer

Resources:

  GrafanaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonGrafanaCloudWatchAccess

  MyGrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: SERVICE_MANAGED
      Name: grafana-assessment-workspace
      DataSources:
        - CLOUDWATCH
      WorkspaceRoleArn: !GetAtt GrafanaServiceRole.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaPluginAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspace
                  - grafana:DescribeWorkspace
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: grafana-plugin-installer-final
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import boto3, cfnresponse

          def handler(event, context):
              client = boto3.client('grafana')
              try:
                  w_id = event['ResourceProperties']['WorkspaceId']
                  plugs = event['ResourceProperties']['Plugins']

                  if event['RequestType'] in ['Create', 'Update']:
                      client.update_workspace(
                          workspaceId=w_id,
                          plugins=plugs
                      )

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Status": "Complete"})
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Status": "FailedButContinuing"})

  GrafanaPluginsResource:
    Type: Custom::GrafanaPlugins
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref MyGrafanaWorkspace
      Plugins:
        - grafana-clock-panel
        - grafana-piechart-panel

  GrafanaAlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: grafana-alerts-topic

  CloudWatchOTELDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: OTEL-Business-Metrics
      DashboardBody: >
        {"widgets":[{"type":"metric","properties":{"metrics":[["AWS/Grafana","WorkspaceUpdates"]],"period":300,"stat":"Sum","region":"us-east-1","title":"OTEL Data"}}]}

Outputs:
  WorkspaceEndpoint:
    Value: !GetAtt MyGrafanaWorkspace.Endpoint
