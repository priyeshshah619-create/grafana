AWSTemplateFormatVersion: '2010-09-09'
Description: Grafana Workspace with SSO and Plugin Installation (V18 FIXED)

Resources:
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaRole.Arn
      GrafanaVersion: '10.4'
      # Using a single-line string to prevent YAML boolean errors
      WorkspaceConfiguration: '{"plugins":{"pluginAdminEnabled":true}}'

  GrafanaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GrafanaWorkspaceRole-V18-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - grafana.amazonaws.com
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaApiAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:DescribeWorkspace
                  - grafana:CreateWorkspaceApiKey
                  - grafana:DeleteWorkspaceApiKey
                Resource: "*"

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt GrafanaRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import json, boto3, urllib3, time
          http = urllib3.PoolManager()
          def send(event, context, status, reason="OK"):
              response_body = json.dumps({
                  "Status": status, "Reason": reason,
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event['StackId'], "RequestId": event['RequestId'],
                  "LogicalResourceId": event['LogicalResourceId'], "Data": {}
              })
              http.request("PUT", event['ResponseURL'], body=response_body)
          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      wid = event['ResourceProperties']['WorkspaceId']
                      plugins = event['ResourceProperties']['Plugins']
                      client = boto3.client('grafana')
                      ws = client.describe_workspace(workspaceId=wid)['workspace']
                      endpoint = f"https://{ws['endpoint']}" if not ws['endpoint'].startswith('http') else ws['endpoint']
                      key_res = client.create_workspace_api_key(
                          workspaceId=wid, keyName='installer-v18',
                          keyRole='ADMIN', secondsToLive=600
                      )
                      key = key_res['key']
                      headers = {"Authorization": f"Bearer {key}", "Content-Type": "application/json"}
                      time.sleep(30)
                      for p in plugins:
                          url = f"{endpoint}/api/plugins/{p}/install"
                          http.request("POST", url, headers=headers, body='{}')
                      client.delete_workspace_api_key(workspaceId=wid, keyId=key_res['id'])
                  send(event, context, "SUCCESS")
              except Exception as e:
                  send(event, context, "FAILED", str(e))

  GrafanaPluginInstallation:
    Type: Custom::GrafanaPlugin
    DependsOn: GrafanaWorkspace
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins:
        - grafana-clock-panel
        - grafana-piechart-panel

Outputs:
  WorkspaceEndpoint:
    Value: !GetAtt GrafanaWorkspace.Endpoint
