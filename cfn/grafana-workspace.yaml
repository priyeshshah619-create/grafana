AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Managed Grafana with Custom Resource Plugin Installer'

Resources:
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      PermissionType: SERVICE_MANAGED
      DataSources:
        - CLOUDWATCH
      AuthenticationProviders:
        - AWS_SSO
      Name: grafana-workspace-automation

  # IAM Role for the Lambda Function
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaPluginAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspace
                  - grafana:DescribeWorkspace
                Resource: !Sub 'arn:aws:grafana:${AWS::Region}:${AWS::AccountId}:/workspaces/*'

  # Lambda Function to Install Plugins
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              grafana = boto3.client('grafana')
              workspace_id = event['ResourceProperties']['WorkspaceId']
              plugins = event['ResourceProperties']['Plugins']
              
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      grafana.update_workspace(
                          workspaceId=workspace_id,
                          configuration={'plugins': plugins}
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  # Custom Resource Trigger
  InstallPluginsResource:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins: 
        - grafana-piechart-panel

Outputs:
  WorkspaceId:
    Description: "The ID of the Grafana Workspace"
    Value: !Ref GrafanaWorkspace
  WorkspaceEndpoint:
    Description: "The Endpoint of the Grafana Workspace"
    Value: !GetAtt GrafanaWorkspace.Endpoint
