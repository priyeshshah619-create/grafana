AWSTemplateFormatVersion: '2010-09-09'
Description: Grafana Workspace with Custom Resource (Plugin Retry Logic)

Resources:
  # 1. IAM Role (Self-Contained)
  GrafanaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GrafanaExecutionRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - grafana.amazonaws.com
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaSelfContainedPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspaceConfiguration
                  - grafana:DescribeWorkspace
                Resource: !Sub 'arn:aws:grafana:${AWS::Region}:${AWS::AccountId}:/workspaces/*'
              - Effect: Allow
                Action:
                  - aps:*
                  - xray:Get*
                  - xray:BatchGet*
                  - cloudwatch:Get*
                  - cloudwatch:List*
                  - cloudwatch:Describe*
                  - logs:Describe*
                  - logs:Get*
                  - logs:List*
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  # 2. The Main Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaRole.Arn
      GrafanaVersion: '10.4'

  # 3. Lambda Function (Now with Retries & Delay)
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt GrafanaRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import json
          import cfnresponse
          import time

          def handler(event, context):
              client = boto3.client('grafana', region_name='us-east-1')
              workspace_id = event['ResourceProperties']['WorkspaceId']
              
              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              # Wait 30 seconds for the Workspace API to settle
              time.sleep(30)
              
              attempts = 0
              max_attempts = 5
              while attempts < max_attempts:
                  try:
                      client.update_workspace_configuration(
                          workspaceId=workspace_id,
                          configuration=json.dumps({
                              "plugins": {
                                  "plugins": ["grafana-clock-panel"]
                              }
                          })
                      )
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Status": "Success"})
                      return
                  except Exception as e:
                      attempts += 1
                      print(f"Attempt {attempts} failed: {str(e)}")
                      time.sleep(20)
              
              cfnresponse.send(event, context, cfnresponse.FAILED, {"Message": "Grafana API not ready after 5 retries"})

  # 4. The Custom Resource
  GrafanaPluginInstallation:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

Outputs:
  WorkspaceEndpoint:
    Description: The endpoint for the Grafana workspace
    Value: !GetAtt GrafanaWorkspace.Endpoint
