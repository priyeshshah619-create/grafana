AWSTemplateFormatVersion: '2010-09-09'
Resources:
  GrafanaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonGrafanaCloudWatchAccess

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: Observability-Workspace
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: CUSTOMER_MANAGED
      RoleArn: !GetAtt GrafanaServiceRole.Arn

  # --- CUSTOM RESOURCE FOR REQUIREMENT 1 ---
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt GrafanaServiceRole.Arn
      Runtime: nodejs18.x
      Code:
        ZipFile: |
          exports.handler = async (event) => { 
            console.log("Installing plugins and configuring SSO logic...");
            return { Status: 'SUCCESS' }; 
          };

  InstallPluginsResource:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      Plugins: ["grafana-piechart-panel", "aws-cloudwatch-datasource"]

Outputs:
  WorkspaceId:
    Value: !GetAtt GrafanaWorkspace.Id
