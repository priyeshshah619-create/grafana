AWSTemplateFormatVersion: '2010-09-09'
Description: 'Grafana Workspace with Automatic Plugin Installation via Custom Resource'

Resources:
  MyGrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      Name: grafana-assessment-workspace
      DataSources: [CLOUDWATCH]

  # Lambda Role to allow plugin updates
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: [lambda.amazonaws.com]}
            Action: ["sts:AssumeRole"]
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: 
                  - "grafana:UpdateWorkspace"
                  - "grafana:DescribeWorkspace"
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "*"

  # Lambda function that installs plugins
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: grafana-plugin-installer
      Handler: plugin_installer.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          # Initial code (CI/CD will update this)
          def handler(event, context):
              import cfnresponse
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

  # Custom Resource to trigger the Lambda
  GrafanaPluginsResource:
    Type: Custom::GrafanaPlugins
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !GetAtt MyGrafanaWorkspace.Id
      Plugins: 
        - "grafana-clock-panel"
        - "grafana-piechart-panel"

Outputs:
  WorkspaceEndpoint:
    Value: !GetAtt MyGrafanaWorkspace.Endpoint
  WorkspaceId:
    Value: !GetAtt MyGrafanaWorkspace.Id
