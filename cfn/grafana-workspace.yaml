AWSTemplateFormatVersion: '2010-09-09'
Description: Grafana Workspace with SSO and Custom Resource for Plugin Installation

Resources:
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaAdminRole.Arn

  GrafanaAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GrafanaAdminRole-${AWS::StackName}-Final-V4'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [grafana.amazonaws.com, lambda.amazonaws.com]
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaFullAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ["grafana:*"]
                Resource: "*"

  PluginFinalInstaller:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-FinalFix-V4'
      Handler: index.handler
      Role: !GetAtt GrafanaAdminRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import json, boto3, cfnresponse, time
          def handler(event, context):
              client = boto3.client('grafana')
              wid = event['ResourceProperties'].get('WorkspaceId')
              p = event['ResourceProperties'].get('Plugins', [])
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      # Wait 10 seconds to ensure workspace is ready for config
                      time.sleep(10)
                      client.update_workspace_configuration(
                          workspaceId=wid,
                          configuration=json.dumps({"plugins": p})
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Status": "Success"})
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Message": str(e)})

  # CHANGED NAME AGAIN TO FORCE RE-RUN
  FinalPluginTriggerV4:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginFinalInstaller.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins:
        - grafana-clock-panel
        - grafana-piechart-panel

Outputs:
  GrafanaEndpoint:
    Value: !GetAtt GrafanaWorkspace.Endpoint
