AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Managed Grafana with Custom Resource Plugin Installer'

Resources:
  # 1. Manual Service Role to bypass 400 error
  GrafanaServiceRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGrafanaCloudWatchAccess

  # 2. Workspace using the created Role
  GrafanaWorkspace:
    Type: 'AWS::Grafana::Workspace'
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      PermissionType: CUSTOMER_MANAGED
      WorkspaceRoleArn: !GetAtt GrafanaServiceRole.Arn
      AuthenticationProviders:
        - AWS_SSO
      Name: grafana-workspace-automation

  # 3. Lambda Role for Custom Resource
  LambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaPluginAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspace
                  - grafana:DescribeWorkspace
                Resource: '*'

  # 4. Plugin Installer Lambda (Fixed Syntax)
  PluginInstallerFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      Handler: index.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              client = boto3.client('grafana')
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      client.update_workspace(
                          workspaceId=event['ResourceProperties']['WorkspaceId'],
                          configuration={'plugins': event['ResourceProperties']['Plugins']}
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Message": str(e)})

  # 5. Custom Resource Trigger
  InstallPlugins:
    Type: 'Custom::GrafanaPluginInstaller'
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins: ["grafana-piechart-panel"]

Outputs:
  WorkspaceId:
    Value: !Ref GrafanaWorkspace
  WorkspaceEndpoint:
    Value: !GetAtt GrafanaWorkspace.Endpoint
