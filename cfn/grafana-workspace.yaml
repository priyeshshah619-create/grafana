AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Managed Grafana with Automated Plugin Installation'

Parameters:
  WorkspaceName:
    Type: String
    Default: 'Observability-Workspace'
  GrafanaPlugins:
    Type: CommaDelimitedList
    Default: 'grafana-clock-panel,grafana-piechart-panel'

Resources:
  # 1. The Managed Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: !Ref WorkspaceName
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: SERVICE_MANAGED
      DataSources:
        - CLOUDWATCH
      NotificationDestinations:
        - SNS

  # 2. IAM Role for Custom Resource Lambda
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspace
                  - grafana:DescribeWorkspace
                Resource: !Sub 'arn:aws:grafana:${AWS::Region}:${AWS::AccountId}:/workspaces/${GrafanaWorkspace.Id}'

  # 3. Lambda Function to Install Plugins
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              grafana = boto3.client('grafana')
              workspace_id = event['ResourceProperties']['WorkspaceId']
              plugins = event['ResourceProperties']['Plugins']
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      grafana.update_workspace(
                          workspaceId=workspace_id,
                          configuration={'plugins': plugins}
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Message": str(e)})

  # 4. Custom Resource Trigger
  InstallPluginsResource:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !GetAtt GrafanaWorkspace.Id
      Plugins: !Ref GrafanaPlugins

Outputs:
  WorkspaceId:
    Value: !GetAtt
