AWSTemplateFormatVersion: '2010-09-09'
Description: 'Managed Grafana with Plugin Installer and OTEL Dashboard'

Resources:
  GrafanaServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam:aws:policy/service-role/AmazonGrafanaCloudWatchAccess

  MyGrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      Name: grafana-assessment-workspace
      WorkspaceRoleArn: !GetAtt GrafanaServiceRole.Arn

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaPluginAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['grafana:UpdateWorkspace', 'grafana:DescribeWorkspace']
                Resource: '*'
              - Effect: Allow
                Action: ['logs:CreateLogGroup', 'logs:CreateLogStream', 'logs:PutLogEvents']
                Resource: '*'

  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: grafana-plugin-installer-final
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 300
      Code:
        ZipFile: |
          import boto3
          import cfn_response
          def handler(event, context):
              client = boto3.client('grafana')
              try:
                  w_id = event['ResourceProperties']['WorkspaceId']
                  plugs = event['ResourceProperties']['Plugins']
                  if event['RequestType'] in ['Create', 'Update']:
                      client.update_workspace(workspaceId=w_id, pluginAdminEnabled=True, plugins=plugs)
                  cfn_response.send(event, context, cfn_response.SUCCESS, {"Status": "Complete"})
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfn_response.send(event, context, cfn_response.FAILED, {"Message": str(e)})

  GrafanaPluginsResource:
    Type: Custom::GrafanaPlugins
    DependsOn: MyGrafanaWorkspace
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref MyGrafanaWorkspace
      Plugins: [grafana-clock-panel, grafana-piechart-panel]

  AlertSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: GrafanaAlertsTopic

  CloudWatchOTELDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: OTEL-Business-Metrics
      DashboardBody: '{"widgets":[{"type":"text","x":0,"y":0,"width":24,"height":3,"properties":{"markdown":"# OTEL Business Metrics Dashboard"}}]}'

Outputs:
  WorkspaceEndpoint:
    Value: !GetAtt MyGrafanaWorkspace.Endpoint