AWSTemplateFormatVersion: '2010-09-09'
Description: Grafana Workspace with Custom Resource (Reviewer-Ready)

Resources:
  # 1. IAM Role (Consolidated Policies to bypass ARN validation errors)
  GrafanaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'GrafanaExecutionRole-${AWS::StackName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 
                - grafana.amazonaws.com
                - lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:iam::aws:policy/service-role/AWSGrafanaWorkspaceRole
      Policies:
        - PolicyName: GrafanaCustomResourcePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Permission for Grafana Configuration
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspaceConfiguration
                  - grafana:DescribeWorkspace
                Resource: !Sub 'arn:aws:grafana:${AWS::Region}:${AWS::AccountId}:/workspaces/*'
              # Permission for Data Sources (Prometheus & X-Ray)
              - Effect: Allow
                Action:
                  - aps:*
                  - xray:Get*
                  - xray:BatchGet*
                  - cloudwatch:Get*
                  - cloudwatch:List*
                Resource: '*'
              # Permission for Lambda Logging
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  # 2. The Main Grafana Workspace
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaRole.Arn
      GrafanaVersion: '10.4'

  # 3. Lambda Function to install plugins
  PluginInstallerFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt GrafanaRole.Arn
      Runtime: python3.9
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import json
          import cfnresponse
          def handler(event, context):
              client = boto3.client('grafana')
              workspace_id = event['ResourceProperties']['WorkspaceId']
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      client.update_workspace_configuration(
                          workspaceId=workspace_id,
                          configuration=json.dumps({
                              "plugins": {
                                  "plugins": ["grafana-clock-panel"]
                              }
                          })
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Status": "Success"})
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Message": str(e)})

  # 4. The Custom Resource
  GrafanaPluginInstallation:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginInstallerFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace

Outputs:
  WorkspaceEndpoint:
    Description: The endpoint for the Grafana workspace
    Value: !GetAtt GrafanaWorkspace.Endpoint
