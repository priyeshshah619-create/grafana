AWSTemplateFormatVersion: '2010-09-09'
Description: 'Unified AWS Observability Stack: Managed Grafana and CloudWatch'

Parameters:
  ArtifactsBucket:
    Type: String
  LambdaSourceKey:
    Type: String
  GrafanaToken:
    Type: String
    NoEcho: true
  ForceUpdateID:
    Type: String
    Default: 'initial'

Resources:
  GrafanaAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: grafana-critical-alerts

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: Enterprise-Observability
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: CUSTOMER_MANAGED
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaCloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ["cloudwatch:Get*", "cloudwatch:List*", "logs:Describe*", "logs:Get*"]
                Resource: "*"

  PluginManagerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: GrafanaPluginManager
      Runtime: python3.11
      Handler: plugin_manager.handler
      Role: !GetAtt PluginManagerExecutionRole.Arn
      Code:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: !Ref LambdaSourceKey
      Environment:
        Variables:
          GRAFANA_TOKEN: !Ref GrafanaToken

  PluginManagerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaAdminAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspaceConfiguration
                  - grafana:UpdateWorkspace
                  - grafana:DescribeWorkspace
                Resource: !Sub 'arn:aws:grafana:${AWS::Region}:${AWS::AccountId}:workspaces/*'

  GrafanaFinalProvisionerV99:
    Type: Custom::GrafanaConfiguration
    Properties:
      ServiceToken: !GetAtt PluginManagerLambda.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins:
        - amazon-cloudwatch-datasource
        - grafana-clock-panel
        - prometheus
      ForceUpdateID: !Ref ForceUpdateID
