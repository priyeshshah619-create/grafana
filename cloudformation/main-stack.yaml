AWSTemplateFormatVersion: '2010-09-09'
Description: 'Unified AWS Observability Stack: Managed Grafana, CloudWatch, OpenTelemetry, and Custom Plugins'

Parameters:
  ArtifactsBucket:
    Type: String
    Description: 'The S3 bucket where GitHub Actions uploads the Lambda package.'
  LambdaSourceKey:
    Type: String
    Default: 'lambda/plugin_manager.zip'

Resources:
  # ==========================================
  # STEP 1: IAM ROLES & SECURITY POLICIES
  # ==========================================
  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaWorkspaceServicePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aps:QueryMetrics
                  - aps:GetLabels
                  - aps:GetSeries
                  - aps:GetMetricMetadata
                Resource: '*'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CustomResourceGrafanaAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - grafana:UpdateWorkspace
                  - grafana:DescribeWorkspace
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # ==========================================
  # STEP 2: AWS MANAGED GRAFANA WITH SSO
  # ==========================================
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: Enterprise-Observability
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: SERVICE_MANAGED
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn
      DataSources:
        - CLOUDWATCH
        - PROMETHEUS

  # ==========================================
  # STEP 3: CUSTOM RESOURCE - PLUGIN INSTALLATION
  # ==========================================
  PluginManagerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: GrafanaPluginManager
      Runtime: python3.11
      Handler: plugin_manager.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: !Ref LambdaSourceKey
      Timeout: 120

  GrafanaPluginInstallationTrigger:
    Type: Custom::GrafanaPluginManager
    Properties:
      ServiceToken: !GetAtt PluginManagerLambda.Arn
      WorkspaceId: !GetAtt GrafanaWorkspace.Id
      Plugins:
        - 'amazon-cloudwatch-datasource'
        - 'grafana-clock-panel'
        - 'prometheus'

  # ==========================================
  # STEP 4: DATA COLLECTION & CONSOLIDATION FRAMEWORK (OTEL)
  # ==========================================
  PrometheusWorkspace:
    Type: AWS::APS::Workspace
    Properties:
      Alias: otel-consolidated-metrics

  OtelSystemsDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'otel-consolidated-telemetry-${AWS::AccountId}'

  # ==========================================
  # STEP 5: CLOUDWATCH SYSTEM DASHBOARDS
  # ==========================================
  CustomCloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: Business-Critical-Metrics
      DashboardBody: >
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/EC2", "CPUUtilization" ],
                  [ "AWS/AmazonMWAA", "CalculatedLag" ]
                ],
                "period": 60,
                "stat": "Average",
                "region": "us-east-1",
                "title": "Consolidated Multi-Cloud Fleet & Application Indicators"
              }
            }
          ]
        }

  # ==========================================
  # STEP 6: ALERTS, NOTIFICATION TEMPLATES, & SNS
  # ==========================================
  GrafanaAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: Grafana-Alert-Forwarder

  CloudWatchAnomalyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: HighLatencyBusinessCriticalAlert
      AlarmDescription: 'Triggers when application processing latency breaches data consolidation baselines.'
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 85
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref GrafanaAlertTopic

Outputs:
  GrafanaURL:
    Description: 'Access endpoint for the Grafana UI console.'
    Value: !GetAtt GrafanaWorkspace.Endpoint
  PrometheusEndpoint:
    Description: 'OpenTelemetry Ingestion endpoint.'
    Value: !GetAtt PrometheusWorkspace.PrometheusEndpoint
