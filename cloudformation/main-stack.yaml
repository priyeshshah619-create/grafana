AWSTemplateFormatVersion: '2010-09-09'
Resources:
  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: Enterprise-Observability
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: ['AWS_SSO']
      PermissionType: CUSTOMER_MANAGED
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn

  GrafanaPluginInstaller:
    Type: Custom::GrafanaConfiguration
    DependsOn: PluginManagerLambda
    Properties:
      ServiceToken: !GetAtt PluginManagerLambda.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins: ["amazon-cloudwatch-datasource", "prometheus", "grafana-clock-panel"]

  ObservabilityDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: Business-Metrics-Dashboard
      DashboardBody: '{"widgets": [{"type": "metric", "properties": {"metrics": [["AWS/EC2", "CPUUtilization"]], "region": "us-east-1", "title": "Business CPU Metrics"}}]}'

  PluginManagerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: GrafanaPluginManager
      Runtime: python3.11
      Handler: plugin_manager.handler
      Role: !GetAtt PluginManagerExecutionRole.Arn
      Code:
        S3Bucket: cf-templates-1712fgpz3xbu9-us-east-1
        S3Key: lambda/plugin_manager.zip

  PluginManagerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GrafanaAdminAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ["grafana:UpdateWorkspaceConfiguration", "grafana:UpdateWorkspace"]
                Resource: !Sub 'arn:aws:grafana:${AWS::Region}:${AWS::AccountId}:workspaces/${GrafanaWorkspace}'

  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: grafana.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GrafanaCloudWatchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ["cloudwatch:Get*", "cloudwatch:List*", "logs:Describe*", "logs:Get*"]
                Resource: "*"
