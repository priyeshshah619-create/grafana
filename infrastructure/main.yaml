AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  AccountId:
    Type: String
    Description: The AWS Account ID

Resources:
  DeploymentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AccountId}-grafana-deployment-bucket"

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders: [AWS_SSO]
      PermissionType: SERVICE_MANAGED
      WorkspaceName: ObservabilityWorkspace

  CloudWatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: MyBusinessDashboard
      DashboardBody: !Sub '{"widgets": [{"type": "metric", "properties": {"metrics": [["AWS/Grafana", "DashboardRequests", "WorkspaceId", "${GrafanaWorkspace}"]], "view": "timeSeries", "region": "us-east-1", "title": "Grafana Requests"}}]}'

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: [lambda.amazonaws.com]}
            Action: ['sts:AssumeRole']
      Policies:
        - PolicyName: GrafanaPluginPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['grafana:UpdateWorkspaceConfiguration', 'logs:CreateLogGroup', 'logs:CreateLogStream', 'logs:PutLogEvents']
                Resource: '*'

  PluginLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: GrafanaPluginManager
      Handler: plugin_installer.handler
      Runtime: python3.9
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Sub "${AccountId}-grafana-deployment-bucket"
        S3Key: lambda/plugin_installer.zip
      Timeout: 300

  GrafanaPluginResource:
    Type: Custom::GrafanaPluginInstaller
    Properties:
      ServiceToken: !GetAtt PluginLambdaFunction.Arn
      WorkspaceId: !Ref GrafanaWorkspace
      Plugins: ["grafana-piechart-panel", "grafana-worldmap-panel"]

Outputs:
  WorkspaceId:
    Value: !Ref GrafanaWorkspace
